<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Encuesta de Salud</title>
</head>

<body>

    <h2>Encuesta de Salud</h2>

    <form>

        <label>Edad:</label>
        <input type="number" min="1" max="100" required>

        <br><br>

        <label>Nivel de dolor:</label>
        <input type="range" min="1" max="10">

        <br><br>

        <label>Tipo de sangre:</label>
        <select required>
            <option>A+</option>
            <option>A-</option>
            <option>B+</option>
            <option>B-</option>
            <option>AB+</option>
            <option>AB-</option>
            <option>O+</option>
            <option>O-</option>
        </select>

        <br><br>

        <button type="submit">Enviar</button>

    </form>

</body>
</html>
